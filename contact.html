<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://analytics.ahrefs.com/analytics.js" data-key="gUdUIF1z6gm25JJFXZoMCg" async></script>
  <meta name="ahrefs-site-verification" content="ed505ee462320a7c05ee06ba5b607230272db773ef12c58c7a29b9a156d3e204">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/images/favicons/zakarya_araby.ico">
  <title>Contact • Zachary Simens</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-2xl mx-auto pt-12 px-6">
    <a href="/" class="inline-flex items-center text-zinc-400 hover:text-white mb-8">
      ← Back to home
    </a>

    <h1 class="text-5xl font-bold mb-2">Let's talk</h1>
    <p class="text-zinc-400 mb-10">Fill out the form and I'll get an enriched lead straight into my Apollo workspace.</p>

    <form id="contactForm" class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
      <div class="space-y-6">
        <div>
          <label class="block text-zinc-400 text-sm mb-1">Name</label>
          <input type="text" id="name" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-white">
        </div>
        <div>
          <label class="block text-zinc-400 text-sm mb-1">Email address</label>
          <input type="email" id="email" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-white">
        </div>
        <div>
          <label class="block text-zinc-400 text-sm mb-1">Company (optional)</label>
          <input type="text" id="company" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-white">
        </div>
        <div>
          <label class="block text-zinc-400 text-sm mb-1">Message / what you're looking for</label>
          <textarea id="message" rows="4" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-4 py-3 focus:outline-none focus:border-white"></textarea>
        </div>
      </div>

      <button type="submit"
        class="mt-8 w-full bg-white text-zinc-950 font-medium py-4 rounded-3xl hover:bg-zinc-200 transition-colors">
        Send to Apollo
      </button>
    </form>

    <div id="result" class="mt-8 text-center hidden"></div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const company = document.getElementById('company').value.trim();
      const message = document.getElementById('message').value.trim();

      result.classList.remove('hidden');
      result.innerHTML = `<p class="text-amber-400">Sending to Apollo...</p>`;

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, company, message })
        });

        const data = await res.json();

        if (res.ok) {
          result.innerHTML = `<p class="text-emerald-400">✅ Lead saved in Apollo + Supabase backup!</p>`;
          form.reset();
        } else {
          result.innerHTML = `<p class="text-red-400">Error: ${data.error || 'Something went wrong'}</p>`;
        }
      } catch (err) {
        result.innerHTML = `<p class="text-red-400">Network error — check that api/contact.js is deployed</p>`;
      }
    });
  </script>
</body>
</html>
